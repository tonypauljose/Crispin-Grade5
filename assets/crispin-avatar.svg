<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="Crispin avatar wearing a number 7 jersey">
  <defs>
    <radialGradient id="cBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>
    <linearGradient id="cPitch" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <radialGradient id="cBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </radialGradient>
    <filter id="cShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded frame background -->
  <circle cx="110" cy="110" r="108" fill="url(#cBg)"/>

  <!-- Pitch arc at the bottom -->
  <path d="M 2 160 Q 110 200 218 160 L 218 220 L 2 220 Z" fill="url(#cPitch)"/>
  <path d="M 2 160 Q 110 200 218 160" stroke="#FACC15" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Stadium lights (little stars) -->
  <g fill="#FACC15" opacity="0.85">
    <circle cx="40" cy="32" r="2.5"/><circle cx="180" cy="36" r="2"/><circle cx="160" cy="18" r="1.5"/><circle cx="60" cy="16" r="1.5"/>
  </g>

  <!-- Shirt / body -->
  <g filter="url(#cShadow)">
    <path d="M 55 178 C 60 142 75 130 90 128 L 110 150 L 130 128 C 145 130 160 142 165 178 Z" fill="#6B21A8"/>
    <!-- Sleeves yellow trim -->
    <path d="M 55 178 C 60 142 75 130 90 128 L 95 140 C 80 146 70 158 66 178 Z" fill="#7E22CE"/>
    <path d="M 165 178 C 160 142 145 130 130 128 L 125 140 C 140 146 150 158 154 178 Z" fill="#7E22CE"/>
    <!-- Collar V -->
    <path d="M 92 128 L 110 150 L 128 128 L 123 134 L 110 141 L 97 134 Z" fill="#4C1D95"/>
    <path d="M 92 128 L 110 150 L 128 128" stroke="#FACC15" stroke-width="1.5" fill="none"/>
    <!-- Jersey number 7 -->
    <text x="110" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="30" fill="#FACC15" stroke="#4C1D95" stroke-width="1.2">7</text>
  </g>

  <!-- Neck -->
  <rect x="100" y="115" width="20" height="18" rx="4" fill="#C48B63"/>

  <!-- Head -->
  <g>
    <!-- Ears -->
    <ellipse cx="72" cy="92" rx="6" ry="9" fill="#D4A77A"/>
    <ellipse cx="148" cy="92" rx="6" ry="9" fill="#D4A77A"/>
    <ellipse cx="72" cy="92" rx="3" ry="5" fill="#B37E52"/>
    <ellipse cx="148" cy="92" rx="3" ry="5" fill="#B37E52"/>

    <!-- Face shape -->
    <ellipse cx="110" cy="92" rx="38" ry="42" fill="#D4A77A"/>

    <!-- Hair -->
    <path d="M 72 78 Q 70 58 90 50 Q 110 42 130 50 Q 150 58 148 78 Q 146 72 140 70 Q 128 60 110 58 Q 92 60 80 70 Q 74 72 72 78 Z" fill="#2A1810"/>
    <path d="M 90 62 Q 100 50 115 56 Q 108 60 102 70 Q 96 65 90 62 Z" fill="#3D2817"/>

    <!-- Eyebrows -->
    <path d="M 86 84 Q 94 80 102 84" stroke="#2A1810" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 118 84 Q 126 80 134 84" stroke="#2A1810" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="94" cy="93" rx="5" ry="6" fill="#FFFFFF"/>
    <ellipse cx="126" cy="93" rx="5" ry="6" fill="#FFFFFF"/>
    <circle cx="94" cy="94" r="3.2" fill="#2A1810"/>
    <circle cx="126" cy="94" r="3.2" fill="#2A1810"/>
    <circle cx="95" cy="93" r="1" fill="#FFFFFF"/>
    <circle cx="127" cy="93" r="1" fill="#FFFFFF"/>

    <!-- Cheeks -->
    <circle cx="82" cy="108" r="6" fill="#FB7185" opacity="0.45"/>
    <circle cx="138" cy="108" r="6" fill="#FB7185" opacity="0.45"/>

    <!-- Nose -->
    <path d="M 108 100 Q 110 108 113 108" stroke="#B37E52" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Smile with teeth -->
    <path d="M 94 114 Q 110 128 126 114 Q 120 122 110 122 Q 100 122 94 114 Z" fill="#4A1D1F"/>
    <path d="M 100 117 Q 110 121 120 117" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Soccer ball at side -->
  <g transform="translate(170, 148) rotate(15)">
    <circle cx="0" cy="0" r="16" fill="url(#cBall)" stroke="#1F2937" stroke-width="1.5"/>
    <polygon points="0,-10 9,-4 6,6 -6,6 -9,-4" fill="#1F2937"/>
    <line x1="0" y1="-10" x2="0" y2="-16" stroke="#1F2937" stroke-width="1.2"/>
    <line x1="9" y1="-4" x2="15" y2="-6" stroke="#1F2937" stroke-width="1.2"/>
    <line x1="6" y1="6" x2="10" y2="13" stroke="#1F2937" stroke-width="1.2"/>
    <line x1="-6" y1="6" x2="-10" y2="13" stroke="#1F2937" stroke-width="1.2"/>
    <line x1="-9" y1="-4" x2="-15" y2="-6" stroke="#1F2937" stroke-width="1.2"/>
  </g>

  <!-- Sparkles around -->
  <g fill="#FACC15">
    <path d="M 36 110 l 2 -6 l 2 6 l 6 2 l -6 2 l -2 6 l -2 -6 l -6 -2 z"/>
    <path d="M 190 80 l 1.5 -4 l 1.5 4 l 4 1.5 l -4 1.5 l -1.5 4 l -1.5 -4 l -4 -1.5 z"/>
  </g>
</svg>
